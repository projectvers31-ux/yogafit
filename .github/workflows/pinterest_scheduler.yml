name: Pinterest Auto-Publisher

on:
  schedule:
    - cron: '0 14 * * *' # تشغيل تلقائي يومياً الساعة 4 عصرًا بتوقيت مصر
  workflow_dispatch: # للتشغيل اليدوي الفوري عند التجربة

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحديث للإصدار الأحدث والأكثر استقراراً

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python publish_pin.py

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # استخدام التوكن الافتراضي لضمان صلاحية الحفظ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "تحديث الجدول: إزالة المنتج المنشور" || exit 0
          git push origin main
