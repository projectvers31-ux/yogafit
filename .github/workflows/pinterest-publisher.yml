name: Pinterest Auto-Publisher

on:
  schedule:
    - cron: '0 */3 * * *' # 🚀 النشر التلقائي كل 3 ساعات يومياً
  workflow_dispatch: # للتشغيل اليدوي الفوري عند التجربة

permissions:
  contents: write # إعطاء صلاحية للكتابة والتعديل على الملفات وحذف المنتجات المنشورة

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python publish_pin.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Pinterest"
          git config --global user.email "actions@github.com"
          
          # حفظ التعديلات على ملفات الـ json بعد حذف المنتج الذي تم نشره
          git add *.json || true
          
          if ! git diff --quiet --staged; then
            git commit -m "Automation: Remove published product from queue"
            git push origin main
          else
            echo "No changes in products queue."
          fi
