name: AI Daily Blog Publisher

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # يسمح لك بتشغيله يدوياً للتجربة في أي وقت

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Generate One Article with AI
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node ai-publisher.js

    - name: Commit and Push Changes back to GitHub
      run: |
        git config --global user.name "GitHub Action AI"
        git config --global user.email "actions@github.com"
        
        # 💡 تم تحديث المسار هنا ليقوم جيت هب بسحب ومزامنة المقالات من المجلد الجديد فوراً
        git add content/blog/ || true
        git add products.json || true
        
        if ! git diff --quiet --staged; then
          git commit -m "Automation: Scheduled Master SEO AI Content Published"
          git push origin main
        else
          echo "No new changes to push."
        fi
